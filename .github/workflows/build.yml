name: Build

on:
  push:
    branches:
      - master

jobs:
  build:
    name: Build release zip
    runs-on: ubuntu-latest
    steps:
      - name: Zip Folder
        run: |
          cd ../
          zip -r /tmp/vademecum_0.2.1.zip vademecum -x "vademecum/.git*"
      - uses: actions/upload-artifact@v7
        with:
          name: vademecum_0.2.1.zip
          path: /tmp/vademecum_0.2.1.zip
          archive: false
